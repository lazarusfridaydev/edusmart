<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduSmart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>EduSmart</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#courses">Courses</a>
        <a href="#quiz">Quiz</a>
    </nav>
    <button id="darkModeToggle">🌙</button>
</header>

<section id="home" class="hero">
    <h2>Learn Smarter, Not Harder</h2>
    <p>Your modern e-learning platform</p>
</section>

 <section id="courses">
    <h2>Our Courses</h2>
    <div class="course-container">
        <div class="card" onclick="startCourse('html')">HTML</div>
        <div class="card" onclick="startCourse('css')">CSS</div>
        <div class="card" onclick="startCourse('js')">JavaScript</div>
    </div>
</section>

<!-- LESSON AREA -->
<section id="lesson" class="hidden">
    <h2 id="lessonTitle"></h2>
    <video id="video" controls width="400"></video>
    <br><br>
    <button onclick="markComplete()">Mark Complete</button>
</section>

<section id="quiz">
    <h2>Quiz</h2>
    <p id="question"></p>
    <div id="answers"></div>
    <button onclick="nextQuestion()">Next</button>
    <h3 id="score"></h3>
</section>

 <div id="certificate" style="display:none;">
    <h2>🎓 Certificate of Completion</h2>
    <p>This certifies that</p>
    <h3 id="certName"></h3>
    <p>has successfully completed the course.</p>
 </div>
<footer>
    <p>© 2026 EduSmart </p>
</footer>

<script src="script.js"></script>
</body>

    

  
</body>
</html>
